<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompraBio — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F6F6F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    /* Logo + título */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: #00502A;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      color: #fff; font-size: 22px;
    }
    .brand h1 {
      font-size: 22px; font-weight: 800;
      color: #0d2e1a; letter-spacing: -.4px;
      margin-bottom: 4px;
    }
    .brand p {
      font-size: 13px; color: #5a7a6e;
    }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #dde5e3;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,80,42,.06);
    }

    .card h2 {
      font-size: 16px; font-weight: 700;
      color: #0d2e1a; margin-bottom: 24px;
    }

    /* Fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: #3d6454; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #8aada5; font-size: 15px; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; height: 42px;
      border: 1.5px solid #dde5e3;
      border-radius: 8px;
      padding: 0 40px 0 36px;
      font-size: 14px; color: #0d2e1a;
      outline: none; transition: border-color .15s;
      background: #fff;
    }
    .input-wrap input:focus { border-color: #00502A; }
    .input-wrap input::placeholder { color: #a0bab3; }
    .eye-btn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #8aada5; font-size: 15px; padding: 4px;
    }
    .eye-btn:hover { color: #00502A; }

    /* Error */
    .error-box {
      background: #fff5f0; border: 1px solid #fca58a;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #8c2000;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }

    /* Button */
    .btn-submit {
      width: 100%; height: 42px;
      background: #00502A; border: none;
      border-radius: 8px; color: #fff;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .15s;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: #003d20; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px; color: #8aada5;
    }
    .login-footer span {
      display: inline-flex; align-items: center; gap: 6px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ee8f2f; display: inline-block;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cart-check-fill"></i></div>
      <h1>CompraBio</h1>
      <p>Aprovação de Pedidos de Compra · Bio Mundo</p>
    </div>

    <div class="card">
      <h2>Entrar na sua conta</h2>

      {% if error %}
      <div class="error-box">
        <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="field">
          <label>Usuário</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="username" placeholder="seu.usuario" autofocus required>
          </div>
        </div>

        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" id="pwd" placeholder="••••••••" required>
            <button type="button" class="eye-btn" onclick="togglePwd()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:16px;font-size:13px;color:#5a7a6e;">
      Não tem conta?
      <a href="/cadastro/" style="color:#00502A;font-weight:600;text-decoration:none;">Criar conta</a>
    </div>
    <div class="login-footer" style="margin-top:16px;">
      <span><span class="dot"></span> Bio Mundo &copy; 2026</span>
    </div>

  </div>

  <script>
    function togglePwd() {
      const p = document.getElementById('pwd');
      const e = document.getElementById('eyeIcon');
      p.type = p.type === 'password' ? 'text' : 'password';
      e.className = p.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
  </script>
</body>
</html>
