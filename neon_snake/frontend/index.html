<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Snake</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">Classic arcade</p>
          <h1>Neon Snake</h1>
        </div>
        <div class="stats">
          <span>Score <strong id="score">0</strong></span>
          <span>Length <strong id="length">3</strong></span>
          <span>Best <strong id="best">0</strong></span>
        </div>
      </header>

      <section class="game-wrap">
        <canvas id="game" width="720" height="720"></canvas>
        <aside>
          <label for="playerName">Player</label>
          <input id="playerName" maxlength="18" placeholder="Seu nome" />
          <button id="startButton">Start</button>
          <p>Use WASD ou setas. Coma os cristais, evite as paredes e o proprio corpo.</p>
          <h2>Leaderboard</h2>
          <ol id="leaderboard"></ol>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
