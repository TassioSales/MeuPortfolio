<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Drift</title>
    <link rel="stylesheet" href="./src/styles/game.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud">
        <div>
          <p class="eyebrow">Single-player arcade</p>
          <h1>Neon Drift</h1>
        </div>
        <div class="stats">
          <span>Score <strong id="score">0</strong></span>
          <span>Energy <strong id="energy">100</strong></span>
          <span>Power <strong id="power">None</strong></span>
          <span>Best <strong id="best">0</strong></span>
        </div>
      </section>

      <section class="stage">
        <canvas id="game" width="1280" height="720"></canvas>
        <div class="overlay" id="menu">
          <div class="menu-panel">
            <p class="eyebrow">Drift protocol ready</p>
            <h2>Survive the grid</h2>
            <input id="pilotName" maxlength="18" placeholder="Nome do piloto" />
            <button id="startButton">Start Run</button>
            <p class="hint">WASD ou setas para pilotar. Colete poderes: escudo, turbo e ima.</p>
            <div class="leaderboard">
              <h3>Leaderboard</h3>
              <ol id="leaderboard"></ol>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
