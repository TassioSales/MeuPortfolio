{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-5" style="max-width:480px">
  <div class="glass-card p-5 text-center">
    <div class="mx-auto mb-4 d-flex align-items-center justify-content-center rounded-circle"
         style="width:72px;height:72px;background:rgba(239,68,68,0.1);">
      <i class="bi bi-trash3 fs-2 text-danger"></i>
    </div>
    <h3 class="fw-bold mb-2">Confirmar Exclusão</h3>
    <p class="text-muted mb-4">
      Tem certeza que deseja excluir <strong>{{ object }}</strong>?<br>
      <small class="text-danger">Esta ação não pode ser desfeita.</small>
    </p>
    <div class="d-flex gap-3 justify-content-center">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-5 fw-bold">
          <i class="bi bi-trash3 me-2"></i>Excluir
        </button>
      </form>
      <a href="javascript:history.back()" class="btn btn-outline-secondary px-5 fw-bold">Cancelar</a>
    </div>
  </div>
</div>
{% endblock %}
