services:
  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    environment:
      - DB_PATH=/data/panorama.db
      - TZ=America/Sao_Paulo
    volumes:
      - panorama_data:/data
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - DB_PATH=/data/panorama.db
      - TZ=America/Sao_Paulo
    volumes:
      - panorama_data:/data
    depends_on:
      - pipeline
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
      - TZ=America/Sao_Paulo
    depends_on:
      - api
    restart: unless-stopped

volumes:
  panorama_data:
